# ─── Rate Limiting Zones ─────────────────────────────────────────────────────
# Checkout: max 5 requests/second per IP (burst allows short spikes)
limit_req_zone $binary_remote_addr zone=checkout_limit:10m rate=5r/s;
# General API: max 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
# Return 429 instead of default 503
limit_req_status 429;

map $http_origin $cors_origin {
    default "";
    "~*^https?://(www\.)?(raaghas\.in|admin\.raaghas\.in)$" $http_origin;
    "~*^http://localhost:(6001|6002)$" $http_origin;
}

server {
    listen 80;
    listen [::]:80;
    server_name raaghas.in www.raaghas.in admin.raaghas.in api.raaghas.in;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.raaghas.in;
    ssl_certificate /etc/letsencrypt/live/raaghas/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raaghas/privkey.pem;
    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        # ── Rate limit: 30 req/sec per IP, burst up to 80 ──────────────────────────
        limit_req zone=api_limit burst=80 nodelay;

        # ── Handle ALL preflight OPTIONS at Nginx level ─────────────────────────────
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        proxy_pass http://127.0.0.1:6005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Strict rate limit on checkout & payment endpoints ──────────────────────
    location ~ ^/api/v1/(payments/create-intent|payments/verify|checkout) {
        limit_req zone=checkout_limit burst=15 nodelay;

        proxy_pass http://127.0.0.1:6005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        alias /var/www/raaghas_new/shared/uploads;
        add_header 'Access-Control-Allow-Origin' '*' always;
        expires 365d;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.raaghas.in;
    ssl_certificate /etc/letsencrypt/live/raaghas/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raaghas/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /_next/static/ {
        alias /var/www/raaghas_new/apps/admin/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /var/www/raaghas_new/apps/admin/public/;
        expires 365d;
    }

    location /uploads/ {
        alias /var/www/raaghas_new/shared/uploads/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        expires 365d;
    }

    location / {
        proxy_pass http://127.0.0.1:6010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name raaghas.in www.raaghas.in;
    ssl_certificate /etc/letsencrypt/live/raaghas/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raaghas/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /_next/static/ {
        alias /var/www/raaghas_new/apps/storefront/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /var/www/raaghas_new/apps/storefront/public/;
        expires 365d;
    }

    location /uploads/ {
        alias /var/www/raaghas_new/shared/uploads/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        expires 365d;
    }

    location / {
        proxy_pass http://127.0.0.1:6009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
