name: VPS Diagnostics

on:
  push:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Diagnostics on VPS
        uses: appleboy/ssh-action@v1.0.3
        id: ssh
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            echo "--- PM2 STATUS ---" > /tmp/vps_diag.txt
            pm2 list >> /tmp/vps_diag.txt
            echo "--- PM2 ADMIN DESCRIBE ---" >> /tmp/vps_diag.txt
            pm2 describe raaghas-admin >> /tmp/vps_diag.txt
            echo "--- CURRENT FOLDER ---" >> /tmp/vps_diag.txt
            ls -la /var/www/raaghas_new/current >> /tmp/vps_diag.txt
            echo "--- NEXT CACHE ---" >> /tmp/vps_diag.txt
            ls -la /var/www/raaghas_new/current/apps/admin/.next >> /tmp/vps_diag.txt 2>&1
            echo "--- FILE CHECK ---" >> /tmp/vps_diag.txt
            grep -C 2 "XXXL" /var/www/raaghas_new/current/apps/admin/src/app/products/new/page.tsx >> /tmp/vps_diag.txt 2>&1 || echo "No XXXL in admin" >> /tmp/vps_diag.txt

      - name: Fetch Diagnostics File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "/tmp/vps_diag.txt"
          target: "./"
          strip_components: 1

      - name: Commit Diagnostics
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add vps_diag.txt
          git commit -m "chore: add vps diagnostics report [skip ci]" || echo "No changes"
          git push origin main
