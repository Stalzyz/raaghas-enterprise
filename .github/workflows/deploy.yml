name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy source files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "apps/,packages/,package.json,turbo.json,.gitignore"
          target: "/var/www/raaghas_new/current/"
          overwrite: true
          timeout: 120s

      - name: Build and Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 600s
          script: |
            set -e
            echo "========================================="
            echo "  Raaghas Build & Deploy"
            echo "  $(date)"
            echo "========================================="

            cd /var/www/raaghas_new/current

            echo "[1/3] Installing dependencies..."
            npm install --legacy-peer-deps

            echo "[2/3] Building apps..."
            npm run build

            echo "[3/3] Reloading PM2..."
            pm2 reload all --update-env

            echo "========================================="
            echo "  Deploy Successful! ✅"
            echo "  $(date)"
            echo "========================================="

      - name: Notify success
        if: success()
        run: echo "🚀 Deployment to Raaghas VPS successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check GitHub Actions logs."

