name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package files
        run: tar -czf deploy.tar.gz apps packages package.json package-lock.json turbo.json .gitignore || echo "Tar completed with warnings"

      - name: Copy tarball to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "deploy.tar.gz"
          target: "/var/www/raaghas_new/current/"
          overwrite: true
          timeout: 120s

      - name: Extract, Build, and Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 600s
          script: |
            set -e
            echo "========================================="
            echo "  Raaghas Build & Deploy via Tarball"
            echo "  $(date)"
            echo "========================================="

            cd /var/www/raaghas_new/current

            echo "[1/4] Extracting files..."
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "[2/4] Installing dependencies..."
            npm install --legacy-peer-deps

            echo "[3/4] Building apps (clearing Next.js cache)..."
            rm -rf apps/admin/.next apps/storefront/.next
            npm run build

            echo "[4/4] Restarting PM2..."
            pm2 restart all --update-env

            echo "========================================="
            echo "  Deploy Successful! ✅"
            echo "  $(date)"
            echo "========================================="

      - name: Notify success
        if: success()
        run: echo "🚀 Deployment to Raaghas VPS successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check GitHub Actions logs."
